<!DOCTYPE html>
<html>
<head>
    <title>Vercel Script Manager v2</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; padding: 20px; }
        textarea { width: 100%; height: 200px; background: #222; color: #0f0; border: 1px solid #444; }
        button { padding: 10px; cursor: pointer; background: #0070f3; color: white; border: none; }
        .list { margin-top: 20px; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body>
    <h2>Script Oluştur</h2>
    <textarea id="code" placeholder="Kodlarını buraya yapıştır..."></textarea><br><br>
    <button onclick="saveScript()">Scripti Vercel'e Kaydet</button>

    <div class="list" id="list">
        <h3>Aktif Scriptlerin</h3>
        <!-- Kaydedilenler burada görünecek -->
    </div>

    <script>
        async function saveScript() {
            const content = document.getElementById('code').value;
            const res = await fetch('/api/script', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content })
            });
            const data = await res.json();
            alert("Kaydedildi! ID: " + data.id);
            location.reload();
        }
        // Not: Tüm listeyi çekmek için bir 'keys' API'si daha eklenebilir.
    </script>
</body>
</html>
